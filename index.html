<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 맛집 지도</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

header{
    background:#ff6b35;
    color:white;
    text-align:center;
    padding:20px;
}

.map{
    padding:15px;
}

.card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

img{
    width:100%;
    border-radius:10px;
}

button{
    background:#ff6b35;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🍜 우리 맛집 지도</h1>
<p>친구들과 공유하는 맛집 리스트</p>
</header>

<div class="map">
<iframe
src="https://maps.google.com/maps?q=인천 부평역&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%"
height="350"
style="border:none;border-radius:15px;">
</iframe>
</div>

<div class="card">
<h2>부평라멘</h2>

<img src="https://picsum.photos/600/300" alt="맛집사진">

<p>⭐ 평점: 4.8</p>
<p>📍 인천 부평구</p>
<p>🍜 국물이 진하고 차슈가 맛있음</p>

<button onclick="window.open('https://maps.google.com')">
지도 보기
</button>
</div>

<div class="card">
<h2>친구 추천 맛집</h2>

<p>친구들이 추천한 맛집을 여기에 추가할 예정!</p>

<button>
맛집 추가
</button>
</div>

</body>
</html>
