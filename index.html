<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 맛집 지도</title>

<style>
body{
font-family:sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#ff6b35;
color:white;
padding:20px;
text-align:center;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

img{
width:100%;
border-radius:10px;
}

button{
background:#ff6b35;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🍜 우리 맛집 지도</h1>
<p>친구들과 공유하는 맛집 리스트</p>
</header>

<div class="card">
<h2>부평라멘</h2>
<img src="https://picsum.photos/400/250" alt="">
<p>⭐ 4.8</p>
<p>📍 인천 부평구</p>
<p>국물 진하고 차슈 맛있음</p>

<button onclick="window.open('https://maps.google.com')">
지도 보기
</button>
</div>

<div class="card">
<h2>맛집 추가 요청</h2>
<p>친구들이 맛집을 등록할 수 있게 만들 예정</p>
<button>추가하기</button>
</div>

</body>
</html>
